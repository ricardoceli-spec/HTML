<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formularios</title>
</head>
<body>
    <h1>Formularios</h1>

    <form action="" method="get">
        <label for="txt_nombres">Nombres: </label>
        <input type="text" name="nombre" id="txt_nombres">
        <br><br>
        <label for="">Edad: </label>
        <input type="number" name="" id="">
        <br><br>
        <label for="">Contraseña:</label>
        <input type="password" name="" id="" required>
        <br><br>
        <label for="">Fecha: </label>
        <input type="date" name="" id="">
        <br><br>

        <label for="">Correo: </label>
        <input type="email" name="correo" id="" required>
        <br><br>

        <label for="">Solo lectura: </label>
        <input type="text" name="" id="" readonly>
        <br><br>

        <label for="">Oculto: </label>
        <input type="text" name="" id="" hidden>
        <br><br>

        <label for="">Textarea: </label>
        <textarea name="" id="" cols="60" rows="5"></textarea>

        <br><br>
        <label for="">Lista: </label>
        <select name="" id="">
            <option value="">Amarillo</option>
            <option value="">Azul</option>
            <option value="">Rojo</option>
        </select>
        <br><br>

        <label for="">Radio: </label> <br>
        <input type="radio" name="rbtn_prueba" id=""> HTML <br>
        <input type="radio" name="rbtn_prueba" id=""> CSS <br>
        <input type="radio" name="rbtn_prueba" id=""> JAVASCRIPT <br>
        <br><br>

        <label for="">Check: </label> <br>
        <input type="checkbox" name="checkbox_uno" id=""> HTML <br>
        <input type="checkbox" name="checkbox_uno" id=""> CSS <br>
        <input type="checkbox" name="checkbox_uno" id=""> JAVASCRIPT <br>
        <br><br>

        <label for="">Subir Archivo</label>
        <input type="file" name="" id="">
        <br><br>

        <label for="">Color</label>
        <input type="color" name="" id="">
        <br><br>

        <label for="">Placeholder: </label>
        <input type="number" name="" id="" placeholder="Ingreso solo números">
        <br><br>

        <label for="">Maxlenght</label>
        <input type="text" name="" id="" maxlength="5">

        <br><br>
        <label for="">Max y Min</label>
        <input type="number" name="" id="" max="10" min="0">

        <br><br>
        <label for="">Resetear</label>
        <input type="reset">


        <br><br>
        <input type="submit" value="Enviar">
        
    </form>
    <br><br><br><br><br><br><br><br><br><br>
</body>
</html>
